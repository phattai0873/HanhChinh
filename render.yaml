services:
  - type: web
    name: hanhchinh-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run db:setup && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hanhchinh-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: hanhchinh-db
    plan: free
